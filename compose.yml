services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ledger
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ledger", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # devtoken is a development-only helper: it serves the JWKS the server verifies
  # tokens against and mints bearer tokens at /token. Never run it in production.
  devtoken:
    build:
      context: .
      dockerfile: Dockerfile
      target: devtoken
    command: ["serve", "--addr", ":8081", "--issuer", "https://devtoken.local", "--audience", "ledger"]
    ports:
      - "8081:8081"

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      LEDGER_POSTGRES_DSN: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      LEDGER_REDIS_URL: redis://:ledger@redis:6379/0
      LEDGER_ENVIRONMENT: development
      LEDGER_LOG_LEVEL: debug
      # Authentication is mandatory. In development the JWKS is served by devtoken;
      # conformance-admin is the principal the test harness mints tokens for.
      LEDGER_AUTH_JWKS_URL: http://devtoken:8081/jwks.json
      LEDGER_AUTH_AUDIENCE: ledger
      LEDGER_AUTH_ISSUER: https://devtoken.local
      LEDGER_AUTH_ADMIN_PRINCIPALS: conformance-admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      devtoken:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      LEDGER_POSTGRES_DSN: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      LEDGER_REDIS_URL: redis://:ledger@redis:6379/0
      LEDGER_ENVIRONMENT: development
      LEDGER_LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
