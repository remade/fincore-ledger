services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ledger
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ledger", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: server
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      LEDGER_POSTGRES_DSN: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      LEDGER_REDIS_URL: redis://:ledger@redis:6379/0
      LEDGER_ENVIRONMENT: development
      LEDGER_LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: worker
    environment:
      LEDGER_POSTGRES_DSN: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      LEDGER_REDIS_URL: redis://:ledger@redis:6379/0
      LEDGER_ENVIRONMENT: development
      LEDGER_LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
